name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The BMad installer clones this repo but does NOT run npm install, so the
      # generated references/scripts are committed. Rebuild and fail if the
      # committed artifacts drift from their canonical sources.
      - name: Rebuild generated BMad artifacts
        run: node tools/build.mjs

      - name: Fail if committed artifacts are stale (drift check)
        run: |
          git diff --exit-code -- bmad/ \
            || { echo "::error::bmad/ generated files are stale — run 'make build' and commit."; exit 1; }
          echo "generated BMad artifacts in sync ✓"

      # Guard the two defects that previously broke BMad installation:
      # (1) module code resolvable from the ROOT marketplace; (2) generated files present.
      - name: Validate BMad marketplace resolution
        run: node tools/check-bmad-marketplace.mjs

      - name: Validate SKILL.md frontmatter (name + description present)
        run: |
          status=0
          while IFS= read -r f; do
            head -1 "$f" | grep -q '^---$' || { echo "MISSING frontmatter: $f"; status=1; continue; }
            awk 'NR>1 && /^---$/{exit} {print}' "$f" | grep -q '^description:' \
              || { echo "MISSING description: $f"; status=1; }
          done < <(find plugins bmad -name SKILL.md)
          [ $status -eq 0 ] && echo "all SKILL.md frontmatter valid ✓"
          exit $status

      - name: Validate JSON manifests parse
        run: |
          for f in $(find . -name '*.json' -not -path './node_modules/*'); do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" \
              || { echo "INVALID JSON: $f"; exit 1; }
          done
          echo "all JSON manifests valid ✓"

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --title "${GITHUB_REF_NAME}"
